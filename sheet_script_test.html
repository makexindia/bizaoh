<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Apps Script Tester</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            padding: 50px;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"], input[type="number"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            width: 100%;
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background-color: #218838;
        }
        #responseArea {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
            background-color: #e9ecef;
            word-wrap: break-word;
            font-family: monospace;
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Test Post Data</h2>
        <form id="gasForm">
            <div class="form-group">
                <label for="total">Total Amount:</label>
                <input type="number" id="total" value="99.50" step="0.01" required>
            </div>
            
            <div class="form-group">
                <label for="items">Items (Comma separated):</label>
                <input type="text" id="items" value="Item A, Item B" required>
            </div>
            
            <div class="form-group">
                <label for="ipAddress">IP Address:</label>
                <input type="text" id="ipAddress" value="192.168.1.1" required>
            </div>

            <button type="submit" id="submitBtn">Send to Google Sheets</button>
        </form>

        <div id="responseArea"></div>
    </div>

    <script>
        // Your Google Apps Script Web App URL
        const scriptURL = 'https://script.google.com/macros/s/AKfycbxaLtUNZMDMAI-4YKROc01iW8n8OAw6FDr5jJEpBixD8pqZzCQWkzBSQFiwqNnLUS4/exec';
        
        const form = document.getElementById('gasForm');
        const responseArea = document.getElementById('responseArea');
        const submitBtn = document.getElementById('submitBtn');

        form.addEventListener('submit', async (e) => {
            e.preventDefault(); // Prevent page refresh
            
            // Gather data from form inputs
            const payload = {
                total: document.getElementById('total').value,
                items: document.getElementById('items').value,
                ipAddress: document.getElementById('ipAddress').value
            };

            // Update UI to show sending status
            submitBtn.innerText = 'Sending...';
            submitBtn.disabled = true;
            responseArea.style.display = 'block';
            responseArea.innerText = 'Sending request to Google Apps Script...';

            try {
                const response = await fetch(scriptURL, {
                    method: 'POST',
                    body: JSON.stringify(payload),
                    // Important: Using 'text/plain' bypasses CORS preflight (OPTIONS) requests.
                    // Google Apps Script will still parse e.postData.contents perfectly.
                    headers: {
                        'Content-Type': 'text/plain;charset=utf-8'
                    }
                });

                const result = await response.json();
                
                responseArea.style.backgroundColor = '#d4edda';
                responseArea.style.color = '#155724';
                responseArea.innerText = 'Success!\n\nResponse from Script:\n' + JSON.stringify(result, null, 2);

            } catch (error) {
                console.error('Error!', error.message);
                responseArea.style.backgroundColor = '#f8d7da';
                responseArea.style.color = '#721c24';
                responseArea.innerText = 'Error: ' + error.message;
            } finally {
                // Reset button state
                submitBtn.innerText = 'Send to Google Sheets';
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
